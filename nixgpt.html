    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Theme Variables: Dark (default) */
        :root {
            --bg-primary: #0a0a00;
            --bg-secondary: #14140a;
            --bg-tertiary: #1f1f0f;
            --accent: #F59E0B;
            --accent-dark: #D97706;
            --accent-grad: linear-gradient(135deg, #F59E0B, #D97706);
            --text-primary: #fef7e0;
            --text-secondary: #d4c9a6;
            --border: #2a2a1a;
            --bubble-user-bg: linear-gradient(120deg, #F59E0B20, #D9770620);
            --bubble-ai-bg: #1f1f0f;
            --shadow: 0 8px 20px rgba(0,0,0,0.4);
            --sidebar-shadow: 2px 0 12px rgba(0,0,0,0.3);
        }

        body.light {
            --bg-primary: #fffbeb;
            --bg-secondary: #fff7e6;
            --bg-tertiary: #fef3c7;
            --accent: #D97706;
            --accent-dark: #B45309;
            --accent-grad: linear-gradient(135deg, #F59E0B, #D97706);
            --text-primary: #2c2418;
            --text-secondary: #5b4b34;
            --border: #fde68a;
            --bubble-user-bg: linear-gradient(120deg, #FEF3C7, #FFEDD5);
            --bubble-ai-bg: #fef9e6;
            --shadow: 0 8px 20px rgba(0,0,0,0.08);
            --sidebar-shadow: 2px 0 12px rgba(0,0,0,0.05);
        }

        /* Layout */
        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 20;
            transform: translateX(0);
            transition: transform 0.25s ease;
        }

        .sidebar-header {
            padding: 20px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.6rem;
            font-weight: 700;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header span:first-child { font-size: 2rem; }
        .sidebar-header .brand { background: var(--accent-grad); background-clip: text; -webkit-background-clip: text; color: transparent; }

        .new-chat-btn {
            margin: 16px;
            background: var(--accent-grad);
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            color: #0a0a00;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .new-chat-btn:hover { opacity: 0.85; transform: scale(0.98); }

        .search-conv {
            margin: 0 16px 12px;
            padding: 10px;
            border-radius: 28px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            outline: none;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }
        .history-group { margin-bottom: 20px; }
        .group-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 8px; }
        .conv-item {
            padding: 10px 12px;
            border-radius: 12px;
            margin-bottom: 6px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: transparent;
            transition: 0.1s;
            font-size: 0.85rem;
        }
        .conv-item:hover, .conv-item.active { background: var(--bg-tertiary); border-left: 3px solid var(--accent); }
        .conv-delete {
            float: right;
            opacity: 0;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .conv-item:hover .conv-delete { opacity: 1; }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
        }
        .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .settings-btn, .clear-btn { background: none; border: 1px solid var(--border); padding: 8px; border-radius: 28px; cursor: pointer; color: var(--text-secondary); font-size: 0.75rem; }

        /* Main area */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }
        .menu-toggle { display: none; font-size: 1.5rem; background: none; border: none; color: var(--text-primary); cursor: pointer; }
        .chat-title { font-weight: 600; }
        .model-badge { background: var(--bg-tertiary); padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; }
        .action-icons { display: flex; gap: 15px; }
        .theme-toggle, .logout-btn { cursor: pointer; background: none; border: none; font-size: 1.2rem; color: var(--text-primary); }

        /* Chat messages */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .message {
            display: flex;
            gap: 14px;
            max-width: 85%;
            animation: fadeIn 0.2s;
        }
        .user-message { align-self: flex-end; flex-direction: row-reverse; }
        .ai-message { align-self: flex-start; }
        .msg-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-tertiary); display: flex; align-items: center; justify-content: center; }
        .msg-bubble {
            padding: 12px 16px;
            border-radius: 20px;
            max-width: 100%;
            overflow-x: auto;
        }
        .user-message .msg-bubble { background: var(--bubble-user-bg); border: 1px solid var(--accent); border-bottom-right-radius: 4px; }
        .ai-message .msg-bubble { background: var(--bubble-ai-bg); border-bottom-left-radius: 4px; }
        .msg-actions { display: flex; gap: 8px; margin-top: 6px; justify-content: flex-end; font-size: 0.7rem; }
        .action-btn { background: none; border: none; cursor: pointer; color: var(--accent); }
        .typing-indicator { display: flex; gap: 6px; padding: 12px; background: var(--bg-tertiary); width: fit-content; border-radius: 24px; }
        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: bounce 1.4s infinite; }

        /* input area */
        .input-area {
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .input-wrapper { flex: 1; display: flex; gap: 8px; background: var(--bg-tertiary); border-radius: 32px; padding: 8px 16px; border: 1px solid var(--border); }
        textarea { flex: 1; background: transparent; border: none; resize: none; outline: none; color: var(--text-primary); font-family: inherit; max-height: 120px; }
        .input-actions { display: flex; gap: 6px; }
        .icon-btn { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--accent); }

        /* Modals */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-card {
            background: var(--bg-secondary); border-radius: 28px; width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto;
            padding: 24px; border: 1px solid var(--accent);
        }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 16px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.8rem; margin-bottom: 4px; color: var(--accent); }
        input, select, textarea { width: 100%; padding: 10px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 20px; color: var(--text-primary); }
        .security-status { background: var(--bg-tertiary); padding: 12px; border-radius: 20px; margin-top: 16px; font-size: 0.8rem; }
        .fullscreen-img {
            position: fixed; inset: 0; background: black; display: flex; align-items: center; justify-content: center; z-index: 1100;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
        @keyframes bounce { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-5px); } }
        @media (max-width: 768px) {
            .sidebar { position: fixed; top: 0; left: 0; height: 100%; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .menu-toggle { display: block; }
            .message { max-width: 95%; }
        }
    </style>
</head>

<script>

    // Global state
    let currentUser = null;

    let conversations = [];      // array of { id, title, messages, createdAt, updatedAt, images? }
    let activeChatId = null;

    let currentAbortController = null;
    let settings = { apiKey: "", modelId: "openai/gpt-4o-mini", imgProvider: "pollinations", imgModel: "stabilityai/stable-diffusion-xl-1024-v1-0", systemPrompt: "You are NiXGPT, a helpful assistant.", theme: "dark" };
    let csrfToken = Math.random().toString(36);
    let currentImageMode = false; // toggle chat/image mode

    // Helper: sanitize input (XSS)
    function sanitize(str) { if(!str) return ""; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }

    // Load settings from Firebase
    async function loadSettingsFromFirebase() {
        if(!currentUser) return;
        const snapshot = await db.ref('globalSettings').once('value');
        const remote = snapshot.val();
        if(remote) {
            settings = { ...settings, ...remote };
            if(isAdmin && settings.apiKey) document.querySelector('#apiKeyInput') && (document.querySelector('#apiKeyInput').value = settings.apiKey);
            applyTheme(settings.theme);
        }
    }
    async function saveSettingsToFirebase() {
        if(!currentUser || !isAdmin) return;
        await db.ref('globalSettings').set({ apiKey: settings.apiKey, modelId: settings.modelId, imgProvider: settings.imgProvider, imgModel: settings.imgModel, systemPrompt: settings.systemPrompt, theme: settings.theme });
    }

    // Conversations localStorage
    function saveConversationsLocal() { if(currentUser && !currentUser.isAnonymous) localStorage.setItem(`nixgpt_${currentUser.uid}`, JSON.stringify(conversations)); else if(currentUser) localStorage.setItem(`nixgpt_guest`, JSON.stringify(conversations)); }
    function loadConversationsLocal() {
        let raw = null;
        if(currentUser && !currentUser.isAnonymous) raw = localStorage.getItem(`nixgpt_${currentUser.uid}`);
        else if(currentUser) raw = localStorage.getItem(`nixgpt_guest`);
        if(raw) { conversations = JSON.parse(raw); if(!conversations.length) newConversation(); } else { newConversation(); }
        renderSidebar();
        if(activeChatId && conversations.find(c=>c.id===activeChatId)) renderMessages(activeChatId);
        else if(conversations.length) { activeChatId = conversations[0].id; renderMessages(activeChatId); }
    }
    function newConversation() {
        const newId = Date.now().toString();
        const newConv = { id: newId, title: "New Chat", messages: [], createdAt: Date.now(), updatedAt: Date.now(), images: [] };
        conversations.unshift(newConv);
        activeChatId = newId;
        saveConversationsLocal();
        renderSidebar();
        renderMessages(activeChatId);
        updateChatTitle("");
    }
    function deleteConversation(id) {
        conversations = conversations.filter(c=>c.id !== id);
        if(activeChatId === id) activeChatId = conversations[0]?.id || null;
        if(!activeChatId) newConversation();
        saveConversationsLocal();
        renderSidebar();
        if(activeChatId) renderMessages(activeChatId);
    }
    function clearAllChats() { if(confirm("Delete all conversations?")) { conversations = []; newConversation(); } }
    function updateChatTitle(firstMsg) { if(firstMsg && firstMsg.length>0 && conversations.find(c=>c.id===activeChatId)?.title==="New Chat") { let title = firstMsg.slice(0,30); conversations.find(c=>c.id===activeChatId).title = title; saveConversationsLocal(); renderSidebar(); } }

    // Render markdown with highlight
    function renderMarkdown(text) { return marked.parse(text); }
    function addMessageToActiveChat(role, content, isImage=false, imgUrl=null) {
        const chat = conversations.find(c=>c.id===activeChatId);
        if(!chat) return;
        const msg = { role, content, timestamp: Date.now(), isImage, imgUrl };
        chat.messages.push(msg);
        chat.updatedAt = Date.now();
        saveConversationsLocal();
        renderMessages(activeChatId);
    }
    async function streamChat(userMessage) {
        if(isGenerating) return;
        const chat = conversations.find(c=>c.id===activeChatId);
        if(!chat) return;
        const apiKey = settings.apiKey;
        if(!apiKey) { addMessageToActiveChat("assistant", "❌ OpenRouter API key missing. Please ask admin to set it in settings."); return; }
        isGenerating = true;
        currentAbortController = new AbortController();
        const messagesHistory = chat.messages.filter(m=>!m.isImage).map(m=>({ role: m.role, content: m.content }));
        if(messagesHistory.length===0 || messagesHistory[messagesHistory.length-1].role !== "user") messagesHistory.push({ role: "user", content: userMessage });
        const sysMsg = { role: "system", content: settings.systemPrompt || "You are NiXGPT, helpful AI." };
        const payload = { model: settings.modelId, messages: [sysMsg, ...messagesHistory], stream: true };
        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` }, body: JSON.stringify(payload), signal: currentAbortController.signal
            });
            if(!response.ok) throw new Error(`API error ${response.status}`);
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = "";
            let tempMessageDiv = null;
            while(true) {
                const { done, value } = await reader.read();
                if(done) break;
                const chunk = decoder.decode(value);
                const lines = chunk.split("\n").filter(l=>l.startsWith("data: "));
                for(let line of lines) {
                    const data = line.replace("data: ", "");
                    if(data === "[DONE]") continue;
                    try {
                        const parsed = JSON.parse(data);
                        const delta = parsed.choices[0].delta.content;
                        if(delta) fullText += delta;
                        renderStreamingMessage(fullText);
                    } catch(e) {}
                }
            }
            addMessageToActiveChat("assistant", fullText);
            document.querySelector('.streaming-temp')?.remove();
        } catch(e) { if(e.name !== 'AbortError') addMessageToActiveChat("assistant", `Error: ${e.message}`); }
        finally { isGenerating = false; currentAbortController = null; renderMessages(activeChatId); }
    }
    function renderStreamingMessage(text) {
        let el = document.querySelector('.streaming-temp');
        if(!el) {
            const container = document.querySelector('.chat-container');
            const tempDiv = document.createElement('div'); tempDiv.className = "message ai-message streaming-temp"; tempDiv.innerHTML = `<div class="msg-avatar">👾</div><div class="msg-bubble"></div>`;
            container.appendChild(tempDiv); el = tempDiv;
        }
        const bubble = el.querySelector('.msg-bubble');
        bubble.innerHTML = renderMarkdown(text);
        hljs.highlightAll();
        const container = document.querySelector('.chat-container');
        container.scrollTop = container.scrollHeight;
    }
    async function generateImage(prompt) {
        if(!prompt) return;
        const provider = settings.imgProvider;
        let imageUrl = "";
        try {
            if(provider === "pollinations") {
                imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=512&height=512`;
                // test fetch
                const res = await fetch(imageUrl, { method: 'HEAD' });
                if(!res.ok) throw new Error("pollinations failed");
            } else {
                const apiKey = settings.apiKey;
                if(!apiKey) throw new Error("OpenRouter key missing");
                const resp = await fetch("https://openrouter.ai/api/v1/chat/completions", {
